{% extends "base.html" %}
{% block title %}Регистрация - Olimp{% endblock %}
{% block content %}
<div style="max-width:450px; margin:20px auto; background:#fff; padding:30px; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.1);">
    <h2 style="text-align:center; margin-bottom:25px; color:#2c3e50;">📝 Регистрация</h2>
    <form method="POST" style="display:flex; flex-direction:column; gap:12px;">
        <input type="text" name="username" placeholder="Логин *" required style="padding:12px; border:2px solid #e2e8f0; border-radius:8px;">
        <input type="email" name="email" placeholder="Email *" required style="padding:12px; border:2px solid #e2e8f0; border-radius:8px;">
        <input type="password" name="password" placeholder="Пароль * (мин. 6 символов)" required minlength="6" style="padding:12px; border:2px solid #e2e8f0; border-radius:8px;">
        <input type="password" name="confirm_password" placeholder="Подтвердите пароль *" required style="padding:12px; border:2px solid #e2e8f0; border-radius:8px;">
        <input type="date" name="birth_date" placeholder="Дата рождения *" required style="padding:12px; border:2px solid #e2e8f0; border-radius:8px;">
        <label style="display:flex; align-items:center; gap:8px; font-size:14px; color:#555;">
            <input type="checkbox" name="agreed" required> Я согласен с условиями
        </label>
        <button type="submit" class="btn btn-primary" style="padding:12px; border:none; border-radius:8px; background:#3498db; color:#fff; font-size:16px; cursor:pointer; margin-top:10px;">Зарегистрироваться</button>
    </form>
    <p style="text-align:center; margin-top:20px; color:#666;">
        Уже есть аккаунт? {% if 'login' in app.view_functions %}<a href="{{ url_for('login') }}">Войти</a>{% endif %}
    </p>
</div>
{% endblock %}
