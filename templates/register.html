{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<div class="card" style="max-width:450px; margin:50px auto;">
    <h2 style="text-align:center;">Регистрация</h2>
    <form method="POST">
        <div class="form-group">
            <label>Логин</label>
            <input type="text" name="username" required>
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" name="password" required>
        </div>
        <div class="form-group">
            <label>Подтвердите пароль</label>
            <input type="password" name="confirm_password" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>Дата рождения</label>
            <input type="date" name="birth_date" required>
        </div>
        <div class="form-group">
            <label>
                <input type="checkbox" name="agreed" required>
                Я соглашаюсь на обработку персональных данных
            </label>
        </div>
        <button type="submit" class="btn btn-success" style="width:100%;">Зарегистрироваться</button>
    </form>
    <p style="text-align:center; margin-top:15px;">Уже есть аккаунт? <a href="{{ url_for('login') }}">Войти</a></p>
</div>
{% endblock %}
